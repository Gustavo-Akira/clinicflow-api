spring:
  application:
    name: clinicflow
  datasource:
    url: ${CLINICFLOW_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clinicflow}
    username: ${CLINICFLOW_DATASOURCE_USERNAME:clinicflow}
    password: ${CLINICFLOW_DATASOURCE_PASSWORD:clinicflow}
  flyway:
    enabled: true
    default-schema: clinicflow
    create-schemas: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  error:
    include-message: always
